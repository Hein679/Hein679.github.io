<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Open+Sans:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <title>Ocean Life</title>
  </head>
  <body>
    <div class="logo"></div>
    <h3 class="trash-collected"></h1>
<div id="overlay" onclick="off()">
  <div id="text">Overlay Text</div>
</div>
    <a href="#" class="tip info" onclick="on()">INFO</a>
    <a href="#" class="tip hint1">
      Hint 1
      <span class="tipText--bottom tipText">Text goes here!</span>
    </a>
    <a href="#" class="tip hint2">
      Hint 2
      <span class="tipText--bottom tipText">Text goes here!</span>
    </a>
    <a href="#" class="tip hint3">
      Hint 3
      <span class="tipText--bottom tipText">Text goes here!</span>
    </a>
    <h1 class="money"></h1>
    <div class="landscape">
      <div class="mountain"></div>
      <div class="mountain mountain-2"></div>
      <div class="mountain mountain-3"></div>
      <div class="sun-container sun-container-1"></div>
      <div class="sun-container">
        <div class="sun"></div>
      </div>
      <div class="cloud"></div>
      <div class="cloud cloud-1"></div>
      <div class="sun-container sun-container-reflection">

      </div>
      <div class="light"></div>

      <div class="splash splash-stone delay-3"></div>
      <div class="splash splash-stone splash-4"></div>
      <div class="splash splash-stone splash-5"></div>
      <div class="lotus lotus-1"></div>
      <div class="lotus lotus-2"></div>
      <div class="lotus lotus-3"></div>
      <div class="trash-container"></div>
      <div class="front">
        <div class="stone"></div>
        <div class="grass"></div>
        <div class="grass grass-1"></div>
        <div class="grass grass-2"></div>
        <div class="reed"></div>
        <div class="reed reed-1"></div>
      </div>
    </div>
